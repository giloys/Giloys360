version: '3.8'

services:
  giloys360:
    image: giloyshub/giloys360:IMAGE_VERSION
    container_name: giloys360-MY_ENV
    restart: unless-stopped
    ports:
      - "HOST_PORT:80"
    environment:
      - VITE_SERVER_URL=REACT_SERVER_URL_VALUE
      - VITE_CLIENT_URL=REACT_CLIENT_URL_VALUE
      - NODE_ENV=MY_ENV
    networks:
      - GILOYS_NETWORK
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  GILOYS_NETWORK:
    external: true